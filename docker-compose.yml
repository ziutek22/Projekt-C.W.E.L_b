services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cwel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./storage:/var/www/storage
    networks:
      - app_network
    depends_on:
      - mysql
    env_file:
      - .env.docker

  nginx:
    image: nginx:alpine
    container_name: cwel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: cwel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: cwel
      MYSQL_USER: cwel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app_network

  adminer:
    image: adminer:latest
    container_name: cwel_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
